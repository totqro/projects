name: Weekly NHL Game Predictions

on:
  schedule:
    # Run at 12:00 PM EST (17:00 UTC) on Saturdays and Sundays for weekend games
    - cron: '0 17 * * 6,0'
  workflow_dispatch: # Allow manual trigger

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: nhllines/requirements.txt

      - name: Install dependencies
        run: pip install -r nhllines/requirements.txt scipy

      - name: Create config from secrets
        working-directory: nhllines
        run: |
          cat > config.json << 'EOF'
          {
            "odds_api_key": "${{ secrets.ODDS_API_KEY }}",
            "odds_api_key_two": "${{ secrets.ODDS_API_KEY_TWO }}",
            "odds_api_key_three": "${{ secrets.ODDS_API_KEY_THREE }}"
          }
          EOF

      - name: Restore ML models
        uses: actions/download-artifact@v4
        with:
          name: nhl-ml-models
          path: nhllines/ml_models/
        continue-on-error: true  # OK: first run won't have models

      - name: Create required directories
        run: mkdir -p nhllines/data nhllines/ml_models nhllines/cache

      - name: Run NHL analysis
        working-directory: nhllines
        run: python main.py --stake 0.50 --conservative

      - name: Check and update game results (30-day lookback)
        working-directory: nhllines
        run: |
          python -c "
          from src.analysis.bet_tracker import check_results
          check_results(days_back=30)
          "

      - name: Update model feedback system
        working-directory: nhllines
        run: |
          python -c "
          from src.analysis.model_feedback import update_model_from_results
          print('Updating model feedback with latest results...')
          update_model_from_results()
          "

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nhllines/data/bet_results.json nhllines/data/analysis_history.json nhllines/data/latest_analysis.json nhllines/data/model_feedback.json
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: update NHL data [$(date +'%Y-%m-%d %H:%M')]"
            git pull --rebase origin main || {
              echo "::warning::Rebase failed, trying merge strategy"
              git rebase --abort 2>/dev/null || true
              git pull --no-rebase -X ours origin main
            }
            git push
            echo "✅ NHL data committed and pushed"
          fi

      - name: Save ML models
        uses: actions/upload-artifact@v4
        with:
          name: nhl-ml-models
          path: nhllines/ml_models/
          retention-days: 90
          overwrite: true

      - name: Notify on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ NHL Predictions Failed"
          to: lucknox@icloud.com
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            The Daily NHL Game Predictions workflow failed.

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Trigger: ${{ github.event_name }}
            Time: ${{ github.event.head_commit.timestamp || 'manual' }}
        continue-on-error: true  # Don't fail the whole job if email fails
