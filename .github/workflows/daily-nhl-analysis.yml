name: Daily NHL Analysis

on:
  schedule:
    # Run at 4:30 PM EDT (20:30 UTC) every day during NHL season
    - cron: '30 20 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  analyze-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: nhllines/requirements.txt

      - name: Install dependencies
        run: pip install -r nhllines/requirements.txt scipy

      - name: Create config from secrets
        working-directory: nhllines
        run: |
          cat > config.json << 'EOF'
          {
            "odds_api_key": "${{ secrets.ODDS_API_KEY }}",
            "odds_api_key_two": "${{ secrets.ODDS_API_KEY_TWO }}",
            "odds_api_key_three": "${{ secrets.ODDS_API_KEY_THREE }}"
          }
          EOF

      - name: Restore ML models
        uses: actions/download-artifact@v4
        with:
          name: nhl-ml-models
          path: nhllines/ml_models/
        continue-on-error: true

      - name: Create required directories
        run: mkdir -p nhllines/data nhllines/ml_models nhllines/cache build/nhllines build/mlblines

      - name: Run NHL analysis
        working-directory: nhllines
        run: python main.py --stake 0.50 --conservative
        continue-on-error: true

      - name: Check and update bet results
        working-directory: nhllines
        run: |
          python -c "
          from src.analysis.bet_tracker import check_results
          check_results(days_back=14)
          "
        continue-on-error: true
      
      - name: Update model feedback system
        working-directory: nhllines
        run: |
          python -c "
          from src.analysis.model_feedback import update_model_from_results
          print('Updating model feedback with latest results...')
          update_model_from_results()
          "
        continue-on-error: true

      - name: Generate parlay performance data
        working-directory: nhllines
        run: |
          python -c "
          from src.analysis.bet_tracker import get_parlay_performance
          import json
          from pathlib import Path
          perf = get_parlay_performance(stake=0.50)
          if perf:
              Path('data/parlay_results.json').write_text(json.dumps(perf, indent=2, default=str))
              print(f'Parlay history: {perf[\"won\"]}W-{perf[\"lost\"]}L ({perf[\"win_rate\"]:.1%}) ROI: {perf[\"roi\"]:+.1%}')
          else:
              print('No parlay data available yet')
          "
        continue-on-error: true

      - name: Verify performance data updated
        run: |
          echo "=== Data file status ==="
          ls -la nhllines/data/bet_results.json nhllines/data/analysis_history.json nhllines/data/latest_analysis.json nhllines/data/model_feedback.json nhllines/data/parlay_results.json 2>/dev/null || true
          python -c "
          import json
          br = json.load(open('nhllines/data/bet_results.json'))
          results = br.get('results', {})
          dates = sorted([v.get('checked_at','')[:10] for v in results.values() if v.get('checked_at')], reverse=True)
          print(f'Tracked bets: {len(results)}')
          print(f'Most recent check: {dates[0] if dates else \"none\"}')
          won = sum(1 for v in results.values() if v.get('result') == 'won')
          lost = sum(1 for v in results.values() if v.get('result') == 'lost')
          print(f'Record: {won}W-{lost}L')

          # Show feedback stats
          try:
              fb = json.load(open('nhllines/data/model_feedback.json'))
              print(f'Model weight: {fb[\"optimal_weights\"][\"model_weight\"]:.2f}')
              print(f'Confidence scaling: {fb[\"optimal_weights\"][\"confidence_scaling\"]:.2f}')
          except:
              print('No feedback data yet')
          "

      - name: Commit updated data back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nhllines/data/bet_results.json nhllines/data/analysis_history.json nhllines/data/latest_analysis.json nhllines/data/model_feedback.json nhllines/data/parlay_results.json
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: update NHL data [$(date +'%Y-%m-%d %H:%M')]"
            git pull --rebase origin main || {
              echo "::warning::Rebase failed, trying merge strategy"
              git rebase --abort 2>/dev/null || true
              git pull --no-rebase -X ours origin main
            }
            git push
            echo "✅ NHL data committed and pushed"
          fi

      - name: Pull latest repo (get fresh MLB data too)
        run: git pull origin main

      - name: Build deploy folder
        run: |
          rm -rf build/nhllines build/mlblines
          mkdir -p build/nhllines build/mlblines
          # Root hub page
          cp nhllines/web/hub.html build/index.html
          # NHL app files
          cp nhllines/web/index.html build/nhllines/
          cp nhllines/web/app.js build/nhllines/
          cp nhllines/web/styles.css build/nhllines/
          # NHL data files (fresh from this run)
          cp nhllines/data/latest_analysis.json build/nhllines/ 2>/dev/null || echo '{"recommendations":[],"games_analyzed":[],"timestamp":""}' > build/nhllines/latest_analysis.json
          cp nhllines/data/bet_results.json build/nhllines/ 2>/dev/null || echo '{"results":{}}' > build/nhllines/bet_results.json
          cp nhllines/data/analysis_history.json build/nhllines/ 2>/dev/null || true
          cp nhllines/data/parlay_results.json build/nhllines/ 2>/dev/null || true
          # MLB app + data files (from latest repo pull)
          cp mlblines/web/index.html build/mlblines/
          cp mlblines/web/app.js build/mlblines/
          cp mlblines/web/styles.css build/mlblines/
          cp mlblines/mlbdata/latest_analysis.json build/mlblines/ 2>/dev/null || echo '{"recommendations":[],"games_analyzed":[],"timestamp":""}' > build/mlblines/latest_analysis.json
          cp mlblines/mlbdata/bet_results.json build/mlblines/ 2>/dev/null || echo '{"results":{}}' > build/mlblines/bet_results.json
          cp mlblines/mlbdata/analysis_history.json build/mlblines/ 2>/dev/null || true
          cp mlblines/mlbdata/parlay_results.json build/mlblines/ 2>/dev/null || true

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          firebase deploy --only hosting --project projects-brawlstars --non-interactive

      - name: Save ML models
        uses: actions/upload-artifact@v4
        with:
          name: nhl-ml-models
          path: nhllines/ml_models/
          retention-days: 90
          overwrite: true
