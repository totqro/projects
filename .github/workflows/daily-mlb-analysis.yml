name: Daily MLB Analysis

on:
  schedule:
    # Run at 11:00 AM EST (16:00 UTC) every day during MLB season
    - cron: '0 16 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  analyze-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push data back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: mlblines/requirements.txt

      - name: Install dependencies
        run: pip install -r mlblines/requirements.txt scipy

      - name: Create config from secrets
        working-directory: mlblines
        run: |
          cat > config.json << 'EOF'
          {
            "odds_api_key": "${{ secrets.ODDS_API_KEY }}",
            "odds_api_key_two": "${{ secrets.ODDS_API_KEY_TWO }}",
            "odds_api_key_three": "${{ secrets.ODDS_API_KEY_THREE }}"
          }
          EOF

      - name: Restore ML models
        uses: actions/download-artifact@v4
        with:
          name: mlb-ml-models
          path: mlblines/ml_models/
        continue-on-error: true

      - name: Create required directories
        run: mkdir -p mlblines/mlbdata mlblines/ml_models mlblines/cache build/mlblines

      - name: Run MLB analysis
        working-directory: mlblines
        run: python main.py --stake 0.50

      - name: Check and update bet results
        working-directory: mlblines
        run: |
          python -c "
          try:
              from src.analysis.bet_tracker import check_results
              check_results(days_back=7)
          except Exception as e:
              print(f'::warning::Bet result check failed: {e}')
              import traceback
              traceback.print_exc()
          "
        continue-on-error: true

      - name: Build deploy folder
        run: |
          mkdir -p build/mlblines
          # Root hub page
          cp mlblines/web/hub.html build/index.html
          # MLB app files
          cp mlblines/web/index.html build/mlblines/
          cp mlblines/web/app.js build/mlblines/
          cp mlblines/web/styles.css build/mlblines/
          # Data files (with fallbacks)
          cp mlblines/mlbdata/latest_analysis.json build/mlblines/ 2>/dev/null || echo '{"recommendations":[],"games_analyzed":[],"timestamp":""}' > build/mlblines/latest_analysis.json
          cp mlblines/mlbdata/bet_results.json build/mlblines/ 2>/dev/null || echo '{"results":{}}' > build/mlblines/bet_results.json
          cp mlblines/mlbdata/analysis_history.json build/mlblines/ 2>/dev/null || true

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          firebase deploy --only hosting --project projects-brawlstars --non-interactive

      - name: Commit updated data back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mlblines/mlbdata/bet_results.json mlblines/mlbdata/analysis_history.json mlblines/mlbdata/latest_analysis.json build/mlblines/
          git diff --cached --quiet || git commit -m "chore: update MLB data [$(date +'%Y-%m-%d')]"
          git pull --rebase origin main || {
            echo "::warning::Rebase failed, attempting merge strategy for data files"
            git rebase --abort 2>/dev/null || true
            git pull --no-rebase -X theirs origin main
          }
          git push
        continue-on-error: true

      - name: Save ML models
        uses: actions/upload-artifact@v4
        with:
          name: mlb-ml-models
          path: mlblines/ml_models/
          retention-days: 90
          overwrite: true
