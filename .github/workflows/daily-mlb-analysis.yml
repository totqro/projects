name: Daily MLB Analysis

on:
  schedule:
    # Run at 11:00 AM EST (16:00 UTC) every day during MLB season
    - cron: '0 16 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: mlblines/requirements.txt

      - name: Install dependencies
        run: pip install -r mlblines/requirements.txt scipy

      - name: Create config from secrets
        working-directory: mlblines
        run: |
          cat > config.json << 'EOF'
          {
            "odds_api_key": "${{ secrets.ODDS_API_KEY }}",
            "odds_api_key_two": "${{ secrets.ODDS_API_KEY_TWO }}",
            "odds_api_key_three": "${{ secrets.ODDS_API_KEY_THREE }}"
          }
          EOF

      - name: Restore ML models
        uses: actions/download-artifact@v4
        with:
          name: mlb-ml-models
          path: mlblines/ml_models/
        continue-on-error: true  # OK: first run won't have models

      - name: Create required directories
        run: mkdir -p mlblines/mlbdata mlblines/ml_models mlblines/cache

      - name: Run MLB analysis
        working-directory: mlblines
        run: python main.py --stake 0.50

      - name: Check and update bet results (21-day lookback)
        working-directory: mlblines
        run: |
          python -c "
          from src.analysis.bet_tracker import check_results
          check_results(days_back=21)
          "

      - name: Generate parlay performance data
        working-directory: mlblines
        run: |
          python -c "
          from src.analysis.bet_tracker import get_parlay_performance
          import json
          from pathlib import Path
          perf = get_parlay_performance(stake=0.50)
          if perf:
              path = Path('mlbdata/parlay_results.json')
              path.write_text(json.dumps(perf, indent=2, default=str))
              print(f'Parlay performance: {perf[\"won\"]}W-{perf[\"lost\"]}L, ROI: {perf[\"roi\"]:.1%}')
          else:
              print('No parlay data yet')
          "

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mlblines/mlbdata/bet_results.json mlblines/mlbdata/analysis_history.json mlblines/mlbdata/latest_analysis.json mlblines/mlbdata/parlay_results.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: update MLB data [$(date +'%Y-%m-%d %H:%M')]"
            git pull --rebase origin main || {
              echo "::warning::Rebase failed, trying merge strategy"
              git rebase --abort 2>/dev/null || true
              git pull --no-rebase -X ours origin main
            }
            git push
            echo "✅ MLB data committed and pushed"
          fi
        continue-on-error: true

      - name: Save ML models
        uses: actions/upload-artifact@v4
        with:
          name: mlb-ml-models
          path: mlblines/ml_models/
          retention-days: 90
          overwrite: true

      - name: Notify on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ MLB Analysis Failed"
          to: lucknox@icloud.com
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            The Daily MLB Analysis workflow failed.

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Trigger: ${{ github.event_name }}
            Time: ${{ github.event.head_commit.timestamp || 'manual' }}
        continue-on-error: true  # Don't fail the whole job if email fails
